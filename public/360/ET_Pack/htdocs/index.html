  <style>
    html {
      background-color: black;
    }

    .mask {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgb(0, 0, 0);
      z-index: 2;
      /* 确保遮罩最上层 */
    }

    .loading {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      width: 200px;
      height: 200px;
    }

    /* 当页面加载完成后，隐藏 loading */
    .hidden {
      display: none;
    }
  </style>
