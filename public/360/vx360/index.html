<!DOCTYPE html>
<html>
<head>
    <script src="./jquery.js"></script>
	<script type="text/javascript" src="./threesixty.min.js"></script>
	<script type="text/javascript" src="./js_360.js"></script>
	<script src="./jquery.reel-min.js"></script>
	<title>360 View Car</title>
	<meta name="keywords" content="">
	<meta name="description" content="">
</head>
<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
        -webkit-user-drag: none;
    }

    .all {
        position: relative;
    }

    #car-container,
    #interior {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f0f0;
        overflow: hidden;
    }

    #car-container {
        display: none;
    }

    #car-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }

    .color-box {
        position: absolute;
        z-index: 2;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .color-name {
        color: #fff;
        font-weight: bold;
        font-size: .46rem;
    }

    .colors {
        display: flex;
        align-items: center;
    }

    .color {
        width: .44rem;
        height: .44rem;
        border-radius: 50%;
        margin-right: .2rem;
        cursor: pointer;
        box-sizing: content-box;
    }

    .color:nth-last-of-type(1) {
        margin-right: 0;
    }

    .color.active {
        border: 3px solid #fff;
    }

    .tabs {
        position: absolute;
        z-index: 200;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        color: #fff;
        background-color: rgba(0, 0, 0, .3);
        width: 3.4rem;
        height: .6rem;
        border-radius: 2rem;
    }

    .tab {
        width: 50%;
        height: 100%;
        border-radius: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: .16rem;
    }

    .tab.active {
        color: #cd8a57;
        background-color: #000;
    }

    .interior-icon {
        width: 100%;
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
    }

    #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.99);
        z-index: 999;
        display: none;
        justify-content: center;
        align-items: center;
    }

    .spinner {
        border: 16px solid #f3f3f3;
        border-radius: 50%;
        border-top: 16px solid #3498db;
        width: 120px;
        height: 120px;
        -webkit-animation: spin 2s linear infinite;
        /* Safari */
        animation: spin 2s linear infinite;
    }

    /* Safari */
    @-webkit-keyframes spin {
        0% {
            -webkit-transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
        }
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>
<body>

	
	<div class="all">
		<div id="car-container">
			<img id="car-image" src="./out/black/car_black_1.png" alt="Car">
		</div>
		<div class="color-box">
			<div class="color-name">Black</div>
			<div class="colors"></div>
		</div>
		<div class="tabs">
			<div class="tab active" data-view="exterior">APPEARANCE</div>
			<div class="tab" data-view="interior">INTERIOR</div>
		</div>
		<div id="interior"></div>
		<div id="loading-overlay">
			<div class="spinner"></div>
		</div>
	</div>

	<script src="./360/three.min.js"></script>
	<script src="./360/panolens.min.js"></script>
	<script src="./360/360-vx.js"></script>
	


</body>
</html>
